name: chat_app
description: "A new Flutter chat application."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2   

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  google_sign_in: ^6.3.0
  cloud_firestore: ^5.6.5  
  firebase_storage: ^12.4.4     

  # Media
  image_picker: ^1.1.2

  # Agora for Video/Audio Calls
  agora_rtc_engine: ^6.3.0
  permission_handler: ^11.3.1
  firebase_app_check: ^0.3.2+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true